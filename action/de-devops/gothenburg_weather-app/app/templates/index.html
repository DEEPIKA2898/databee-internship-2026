<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gothenburg Weather Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container text-center mt-5">
    <h1 class="mb-3 text-primary">{{ city }} Weather</h1>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% else %}
        <div class="card mx-auto shadow-lg" style="max-width: 400px;">
            <div class="card-body">
                <h2 class="card-title">{{ temp }}°C</h2>
                <p class="card-text text-muted">{{ desc }}</p>
                <p>💧 Humidity: {{ humidity }}% | 🌬 Wind: {{ wind }} m/s</p>
            </div>
        </div>

        <h3 class="mt-5">5-Day Forecast</h3>
        <div class="row justify-content-center">
            {% for f in forecasts %}
                <div class="col-md-2 col-sm-4 mt-3">
                    <div class="card p-2 shadow-sm">
                        <p class="fw-bold">{{ f.datetime.split(' ')[0] }}</p>
                        <p>{{ f.temp }}°C</p>
                        <p>{{ f.desc }}</p>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% endif %}
</div>
</body>
</html>
